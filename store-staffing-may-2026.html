<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח שיבוץ — מאי 2026 | OTILYAS</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:     #3a3040;
    --ink-mid: #6b5f78;
    --ink-lt:  #a896b4;
    --ink-xl:  #d4c8dc;
    --paper:   #faf7f4;
    --paper-2: #f3ede6;
    --paper-3: #e8ddd0;
    --paper-4: #d9cbb8;
    --gold:    #c4a882;
    --gold-lt: #ede0cc;

    /* Designer palette — תכלת / סגול / בננה */
    --d-tali:        #b8d8f0;   /* תכלת */
    --d-tali-text:   #0d3a5c;
    --d-tali-bar:    #2980c0;

    --d-michal:      #f5f0a0;   /* בננה */
    --d-michal-text: #4a3e00;
    --d-michal-bar:  #c8a800;

    --d-irit:        #d4b8f0;   /* סגול */
    --d-irit-text:   #32086a;
    --d-irit-bar:    #7030c8;

    --d-tal:         #b8edd8;   /* מנטה — 4th ברורה */
    --d-tal-text:    #054030;
    --d-tal-bar:     #28a870;

    --d-closed:      #eeebe6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--paper);
    color: var(--ink);
    direction: rtl;
  }

  /* ===== LOCK ===== */
  #lock-screen {
    position: fixed; inset: 0;
    background: var(--ink);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .lock-box {
    background: var(--paper);
    border-radius: 2px;
    padding: 52px 44px;
    text-align: center;
    max-width: 360px; width: 90%;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }
  .lock-logo {
    font-family: 'Heebo', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 8px;
    color: var(--ink);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .lock-rule {
    width: 40px; height: 1px;
    background: var(--gold);
    margin: 12px auto 20px;
  }
  .lock-subtitle {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: var(--ink-mid);
    margin-bottom: 32px;
    font-weight: 400;
  }
  .lock-box input {
    width: 100%;
    padding: 13px 16px;
    border: 1px solid var(--paper-4);
    border-radius: 2px;
    font-size: 16px;
    text-align: center;
    letter-spacing: 4px;
    outline: none;
    background: var(--paper-2);
    transition: border-color .2s;
    margin-bottom: 12px;
    font-family: 'Heebo', sans-serif;
    color: var(--ink);
  }
  .lock-box input:focus { border-color: var(--gold); background: white; }
  .lock-btn {
    width: 100%; padding: 13px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 2px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    transition: background .2s;
  }
  .lock-btn:hover { background: var(--ink-mid); }
  .lock-error { color: #a04040; font-size: 12px; margin-top: 10px; min-height: 16px; }

  /* ===== APP ===== */
  #app { display: none; min-height: 100vh; padding-bottom: 60px; }

  /* ===== HEADER ===== */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 28px 36px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px;
  }
  .header-brand {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 7px;
    color: var(--paper);
    opacity: 0.6;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header-title {
    font-family: 'Caveat', cursive;
    font-size: 30px;
    font-weight: 600;
    color: var(--paper);
    line-height: 1;
  }
  .header-gold-line {
    width: 32px; height: 1px;
    background: var(--gold);
    margin-top: 8px;
  }
  .edit-toggle-btn {
    padding: 10px 22px;
    background: transparent;
    color: var(--paper);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 2px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    transition: all .2s;
  }
  .edit-toggle-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.6); }
  .edit-toggle-btn.active { background: var(--gold); border-color: var(--gold); color: white; }

  .edit-banner {
    background: var(--gold-lt);
    color: var(--ink);
    text-align: center;
    padding: 10px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    display: none;
    font-family: 'Caveat', cursive;
    font-size: 16px;
  }
  .edit-banner.visible { display: block; }

  /* ===== LEGEND ===== */
  .legend {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 18px 32px;
    background: var(--paper-2);
    border-bottom: 1px solid var(--paper-3);
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 14px;
    border-radius: 2px;
    border: 1px solid var(--paper-4);
    background: var(--paper);
  }
  .legend-name {
    font-family: 'Caveat', cursive;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.5px;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ===== CALENDAR ===== */
  .calendar-wrap { padding: 28px 24px 0; }

  .cal-header-row {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 6px;
  }
  .cal-day-name {
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--ink-lt);
    padding: 6px 0;
    text-transform: uppercase;
  }
  .cal-day-name.weekend { color: var(--ink-mid); }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }

  .cal-cell {
    background: white;
    border-radius: 2px;
    min-height: 96px;
    padding: 10px 9px 8px;
    border: 1px solid var(--paper-3);
    transition: all .15s;
    position: relative;
    overflow: hidden;
  }
  .cal-cell::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 3px; height: 100%;
    background: transparent;
    transition: background .15s;
  }
  .cal-cell.empty { background: transparent; border-color: transparent; box-shadow: none; }
  .cal-cell.edit-mode:not(.empty) { cursor: pointer; }
  .cal-cell.edit-mode:not(.empty):hover {
    border-color: var(--gold);
    box-shadow: 0 2px 12px rgba(184,151,90,0.2);
  }
  .cal-cell.edit-mode:not(.empty):hover::before { background: var(--gold); }

  .day-number {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-lt);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .cal-cell.today .day-number {
    background: var(--ink);
    color: white;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
  }

  .day-note {
    font-size: 9px;
    color: var(--ink-lt);
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }

  .designer-badge {
    display: block;
    font-family: 'Caveat', cursive;
    font-size: 19px;
    font-weight: 600;
    line-height: 1.1;
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  /* Light monochromatic shades per designer */
  [data-designer="tali"] {
    background: var(--d-tali);
    border-color: #7ab8e8;
  }
  [data-designer="tali"] .day-number { color: var(--d-tali-text); }
  [data-designer="tali"] .day-note   { color: #2060a0; }
  [data-designer="tali"] .designer-badge { color: var(--d-tali-text); }
  [data-designer="tali"]::before { background: var(--d-tali-bar) !important; }

  [data-designer="michal"] {
    background: var(--d-michal);
    border-color: #d8c840;
  }
  [data-designer="michal"] .day-number { color: var(--d-michal-text); }
  [data-designer="michal"] .day-note   { color: #7a6000; }
  [data-designer="michal"] .designer-badge { color: var(--d-michal-text); }
  [data-designer="michal"]::before { background: var(--d-michal-bar) !important; }

  [data-designer="irit"] {
    background: var(--d-irit);
    border-color: #a870e0;
  }
  [data-designer="irit"] .day-number { color: var(--d-irit-text); }
  [data-designer="irit"] .day-note   { color: #5018a0; }
  [data-designer="irit"] .designer-badge { color: var(--d-irit-text); }
  [data-designer="irit"]::before { background: var(--d-irit-bar) !important; }

  [data-designer="tal"] {
    background: var(--d-tal);
    border-color: #50c890;
  }
  [data-designer="tal"] .day-number { color: var(--d-tal-text); }
  [data-designer="tal"] .day-note   { color: #106040; }
  [data-designer="tal"] .designer-badge { color: var(--d-tal-text); }
  [data-designer="tal"]::before { background: var(--d-tal-bar) !important; }

  [data-designer="closed"] {
    background: var(--d-closed);
    border-color: var(--paper-3);
  }
  [data-designer="closed"] .day-number { color: var(--ink-xl); }
  [data-designer="closed"] .designer-badge {
    font-family: 'Heebo', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 2px;
    color: var(--ink-xl);
    text-transform: uppercase;
  }

  /* ===== STATS ===== */
  .stats-section { padding: 28px 24px 0; }
  .stats-title {
    font-size: 10px; font-weight: 700; letter-spacing: 4px;
    color: var(--ink-lt); text-transform: uppercase; margin-bottom: 14px;
  }
  .stats-wrap {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 8px;
  }
  .stat-card {
    background: white;
    border: 1px solid var(--paper-3);
    border-radius: 2px;
    padding: 16px 14px 14px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 100%; height: 3px;
  }
  .stat-card.s-tali::before   { background: var(--ink); }
  .stat-card.s-michal::before { background: var(--ink-mid); }
  .stat-card.s-irit::before   { background: var(--paper-4); }
  .stat-card.s-tal::before    { background: var(--paper-3); }
  .stat-card.s-closed::before { background: var(--paper-2); }
  .stat-card.s-empty::before  { background: var(--paper-3); }

  .stat-name {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
    line-height: 1;
  }
  .stat-count { font-size: 28px; font-weight: 700; color: var(--ink); line-height: 1; }
  .stat-label { font-size: 9px; color: var(--ink-lt); margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }

  /* ===== MODAL ===== */
  #edit-modal {
    position: fixed; inset: 0;
    background: rgba(28,28,28,0.7);
    display: none; align-items: center; justify-content: center; z-index: 1000;
    backdrop-filter: blur(2px);
  }
  #edit-modal.open { display: flex; }
  .modal-box {
    background: var(--paper);
    border-radius: 2px;
    padding: 28px 24px;
    width: 90%; max-width: 320px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-title {
    font-family: 'Caveat', cursive;
    font-size: 22px; font-weight: 600; color: var(--ink);
    margin-bottom: 20px;
  }
  .modal-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .modal-opt {
    padding: 14px 10px;
    border-radius: 2px;
    border: 1px solid var(--paper-3);
    cursor: pointer;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    background: white;
    transition: all .12s;
  }
  .modal-opt:hover { background: var(--ink); color: white; border-color: var(--ink); }
  .modal-opt[data-val="closed"] {
    font-family: 'Heebo', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--ink-lt);
  }
  .modal-opt[data-val=""] {
    font-family: 'Heebo', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--ink-xl);
  }
  .modal-cancel {
    font-size: 11px; letter-spacing: 2px; color: var(--ink-lt);
    cursor: pointer; padding: 8px; display: block;
    font-family: 'Heebo', sans-serif;
  }
  .modal-cancel:hover { color: var(--ink); }

  /* ===== FOOTER ===== */
  .footer {
    padding: 24px 32px 0;
    display: flex; gap: 12px; flex-wrap: wrap;
    align-items: center; justify-content: space-between;
    border-top: 1px solid var(--paper-3);
    margin-top: 28px;
  }
  .timestamp { font-size: 11px; color: var(--ink-lt); letter-spacing: 0.5px; }
  .export-btn {
    padding: 10px 20px;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--paper-4);
    border-radius: 2px;
    font-size: 11px;
    cursor: pointer;
    font-weight: 500;
    letter-spacing: 2px;
    font-family: 'Heebo', sans-serif;
    transition: all .2s;
  }
  .export-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }

  @media (max-width: 600px) {
    header { padding: 18px 16px; }
    .calendar-wrap { padding: 16px 10px 0; }
    .cal-cell { min-height: 74px; padding: 7px 6px; }
    .designer-badge { font-size: 15px; }
    .legend { padding: 12px 16px; }
    .stats-section { padding: 18px 10px 0; }
    .footer { padding: 18px 16px 0; margin-top: 20px; }
  }
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-logo">OTILYAS</div>
    <div class="lock-rule"></div>
    <div class="lock-subtitle">לוח שיבוץ — מאי 2026</div>
    <input type="password" id="pw-input" placeholder="••••••••" autofocus onkeydown="if(event.key==='Enter')checkPw()">
    <button class="lock-btn" onclick="checkPw()">כניסה</button>
    <div class="lock-error" id="pw-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <header>
    <div>
      <div class="header-brand">OTILYAS Studio</div>
      <div class="header-title">לוח שיבוץ — מאי 2026</div>
      <div class="header-gold-line"></div>
    </div>
    <button class="edit-toggle-btn" id="edit-btn" onclick="toggleEdit()">עריכה</button>
  </header>

  <div class="edit-banner" id="edit-banner">✦ מצב עריכה פעיל — לחצי על יום לשינוי שיבוץ ✦</div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--ink)"></div><span class="legend-name">טלי</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--ink-mid)"></div><span class="legend-name">מיכל</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--paper-4)"></div><span class="legend-name">עירית</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--paper-3)"></div><span class="legend-name">טל</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--paper-2); border:1px solid var(--paper-4)"></div><span class="legend-name" style="color:var(--ink-lt)">סגור</span></div>
  </div>

  <div class="calendar-wrap">
    <div class="cal-header-row">
      <div class="cal-day-name weekend">א׳</div>
      <div class="cal-day-name">ב׳</div>
      <div class="cal-day-name">ג׳</div>
      <div class="cal-day-name">ד׳</div>
      <div class="cal-day-name">ה׳</div>
      <div class="cal-day-name">ו׳</div>
      <div class="cal-day-name weekend">ש׳</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="stats-section">
    <div class="stats-title">סיכום ימים</div>
    <div class="stats-wrap" id="stats-wrap"></div>
  </div>

  <div class="footer">
    <span class="timestamp" id="timestamp"></span>
    <button class="export-btn" onclick="exportData()">ייצוא ←</button>
  </div>

</div>

<!-- MODAL -->
<div id="edit-modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">מי מאיישת?</div>
    <div class="modal-options">
      <div class="modal-opt" data-val="tali"   onclick="assignDesigner(this)">טלי</div>
      <div class="modal-opt" data-val="michal" onclick="assignDesigner(this)">מיכל</div>
      <div class="modal-opt" data-val="irit"   onclick="assignDesigner(this)">עירית</div>
      <div class="modal-opt" data-val="tal"    onclick="assignDesigner(this)">טל</div>
      <div class="modal-opt" data-val="closed" onclick="assignDesigner(this)">סגור</div>
      <div class="modal-opt" data-val=""       onclick="assignDesigner(this)">ריק</div>
    </div>
    <span class="modal-cancel" onclick="closeModal()">ביטול</span>
  </div>
</div>

<script>
const PASSWORD = 'OTILYAS17';
const MAY_START_DOW = 5; // May 1 2026 = Friday

const INITIAL = {
  1:  {d:'closed', note:''},
  2:  {d:'closed', note:'שבת'},
  3:  {d:'tali',   note:''},
  4:  {d:'tali',   note:''},
  5:  {d:'tali',   note:'ל״ג בעומר'},
  6:  {d:'tali',   note:''},
  7:  {d:'tali',   note:''},
  8:  {d:'tali',   note:'יום האם'},
  9:  {d:'closed', note:'שבת'},
  10: {d:'tali',   note:''},
  11: {d:'tali',   note:''},
  12: {d:'michal', note:''},
  13: {d:'tali',   note:''},
  14: {d:'tal',    note:''},
  15: {d:'tal',    note:''},
  16: {d:'closed', note:'שבת'},
  17: {d:'tali',   note:''},
  18: {d:'michal', note:''},
  19: {d:'irit',   note:'ערב חג — קצר'},
  20: {d:'tali',   note:''},
  21: {d:'tali',   note:''},
  22: {d:'tali',   note:''},
  23: {d:'closed', note:'שבת'},
  24: {d:'tali',   note:''},
  25: {d:'michal', note:'י׳ ירושלים'},
  26: {d:'irit',   note:''},
  27: {d:'michal', note:''},
  28: {d:'tali',   note:''},
  29: {d:'tali',   note:''},
  30: {d:'closed', note:'שבת'},
  31: {d:'closed', note:'ערב שבועות'}
};

const LABELS = {
  tali:'טלי', michal:'מיכל', irit:'עירית', tal:'טל', closed:'סגור', '':''
};

let calData = {}, editMode = false, selectedDay = null;

function init() {
  const s = localStorage.getItem('otilyas-may-2026');
  calData = s ? JSON.parse(s) : JSON.parse(JSON.stringify(INITIAL));
  render(); renderStats(); updateTs();
}

function save() {
  localStorage.setItem('otilyas-may-2026', JSON.stringify(calData));
  updateTs();
}

function updateTs() {
  const el = document.getElementById('timestamp');
  if (el) el.textContent = 'עודכן: ' + new Date().toLocaleString('he-IL');
}

function render() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const today = new Date();
  const isCurrent = today.getMonth() === 4 && today.getFullYear() === 2026;

  for (let i = 0; i < MAY_START_DOW; i++) {
    const e = document.createElement('div');
    e.className = 'cal-cell empty';
    grid.appendChild(e);
  }

  for (let day = 1; day <= 31; day++) {
    const entry = calData[day] || {d:'', note:''};
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    if (entry.d) cell.dataset.designer = entry.d;
    if (isCurrent && today.getDate() === day) cell.classList.add('today');
    if (editMode) cell.classList.add('edit-mode');
    cell.dataset.day = day;
    cell.onclick = () => openModal(day);

    const num = document.createElement('div');
    num.className = 'day-number';
    num.textContent = day;
    cell.appendChild(num);

    if (entry.note) {
      const n = document.createElement('div');
      n.className = 'day-note';
      n.textContent = entry.note;
      cell.appendChild(n);
    }

    if (entry.d && LABELS[entry.d]) {
      const b = document.createElement('div');
      b.className = 'designer-badge';
      b.textContent = LABELS[entry.d];
      cell.appendChild(b);
    }

    grid.appendChild(cell);
  }
}

function renderStats() {
  const c = {tali:0, michal:0, irit:0, tal:0, closed:0, '':0};
  for (let d = 1; d <= 31; d++) {
    const v = (calData[d]||{}).d || '';
    if (c[v] !== undefined) c[v]++;
  }
  const wrap = document.getElementById('stats-wrap');
  wrap.innerHTML = '';
  [
    {k:'tali',   n:'טלי',   cls:'s-tali'},
    {k:'michal', n:'מיכל',  cls:'s-michal'},
    {k:'irit',   n:'עירית', cls:'s-irit'},
    {k:'tal',    n:'טל',    cls:'s-tal'},
    {k:'closed', n:'סגור',  cls:'s-closed'},
    {k:'',       n:'פנוי',  cls:'s-empty'},
  ].forEach(it => {
    const card = document.createElement('div');
    card.className = 'stat-card ' + it.cls;
    card.innerHTML = `<div class="stat-name">${it.n}</div><div class="stat-count">${c[it.k]||0}</div><div class="stat-label">ימים</div>`;
    wrap.appendChild(card);
  });
}

function toggleEdit() {
  editMode = !editMode;
  const btn = document.getElementById('edit-btn');
  const banner = document.getElementById('edit-banner');
  btn.textContent = editMode ? 'סגור עריכה' : 'עריכה';
  btn.classList.toggle('active', editMode);
  banner.classList.toggle('visible', editMode);
  render();
}

function openModal(day) {
  if (!editMode) return;
  selectedDay = day;
  document.getElementById('modal-title').textContent = day + ' במאי';
  document.getElementById('edit-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
  selectedDay = null;
}
function assignDesigner(el) {
  if (selectedDay === null) return;
  if (!calData[selectedDay]) calData[selectedDay] = {d:'', note:''};
  calData[selectedDay].d = el.dataset.val;
  save(); render(); renderStats(); closeModal();
}
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function exportData() {
  const blob = new Blob([JSON.stringify(calData, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'otilyas-may-2026.json';
  a.click();
}

function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    const err = document.getElementById('pw-error');
    err.textContent = 'סיסמה שגויה';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    setTimeout(() => err.textContent = '', 2500);
  }
}
</script>
</body>
