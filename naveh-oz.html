<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>נווה עוז — מדריך בעלי מקצוע</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --terra: #C4704B;
    --terra-light: #E8956D;
    --terra-dark: #A05535;
    --gold: #D4A84B;
    --gold-light: #F0C97A;
    --cream: #FAF6EF;
    --cream-dark: #F0E9DC;
    --olive: #5C7A4E;
    --olive-light: #7A9A6A;
    --brown: #2C1810;
    --brown-mid: #5C3B28;
    --text: #2C1810;
    --text-muted: #7A6555;
    --border: #E0D0BC;
    --shadow: rgba(44,24,16,0.12);
    --card-bg: #FFFDF9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* HERO */
  .hero {
    background: var(--brown);
    position: relative;
    overflow: hidden;
    padding: 48px 24px 36px;
    text-align: center;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(196,112,75,0.35) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(212,168,75,0.25) 0%, transparent 50%);
  }
  .hero-pattern {
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background-image: repeating-linear-gradient(
      45deg, transparent, transparent 20px,
      rgba(255,255,255,1) 20px, rgba(255,255,255,1) 21px
    );
  }
  .hero-content { position: relative; z-index: 1; }
  .hero-badge {
    display: inline-block;
    background: var(--terra);
    color: white;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 16px;
  }
  .hero h1 {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 900;
    color: var(--cream);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .hero h1 span { color: var(--gold-light); }
  .hero p {
    color: rgba(250,246,239,0.6);
    font-size: 1rem;
    font-weight: 300;
    margin-bottom: 28px;
  }
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-num {
    display: block;
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.75rem;
    color: rgba(250,246,239,0.5);
    font-weight: 300;
  }
  .stat-divider {
    width: 1px;
    background: rgba(255,255,255,0.1);
    align-self: stretch;
    min-height: 40px;
  }

  /* STICKY SEARCH */
  .search-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--brown-mid);
    padding: 12px 20px;
    box-shadow: 0 4px 20px var(--shadow);
  }
  .search-inner {
    max-width: 920px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .search-wrap { position: relative; flex: 1; }
  .search-icon {
    position: absolute;
    right: 13px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 10px 40px 10px 14px;
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    background: rgba(255,255,255,0.09);
    color: white;
    font-family: 'Heebo', sans-serif;
    font-size: 0.95rem;
    direction: rtl;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.35); }
  .search-input:focus {
    border-color: var(--terra-light);
    background: rgba(255,255,255,0.14);
  }
  .result-count {
    color: rgba(255,255,255,0.5);
    font-size: 0.8rem;
    white-space: nowrap;
    min-width: 80px;
    text-align: center;
  }
  .result-count span { color: var(--gold-light); font-weight: 600; }

  /* FILTERS */
  .filters-wrap {
    background: var(--cream-dark);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters-wrap::-webkit-scrollbar { display: none; }
  .filters {
    display: flex;
    gap: 7px;
    max-width: 920px;
    margin: 0 auto;
    flex-wrap: nowrap;
    min-width: max-content;
  }
  .filter-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--text-muted);
    font-family: 'Heebo', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    user-select: none;
  }
  .filter-chip:hover { border-color: var(--terra); color: var(--terra-dark); background: #FFF8F4; }
  .filter-chip.active { background: var(--terra); border-color: var(--terra); color: white; font-weight: 600; }
  .chip-count {
    background: rgba(0,0,0,0.08);
    border-radius: 10px;
    padding: 1px 5px;
    font-size: 0.68rem;
  }
  .filter-chip.active .chip-count { background: rgba(255,255,255,0.25); }

  /* MAIN */
  .main {
    max-width: 920px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }
  .section-label {
    font-size: 0.73rem;
    font-weight: 600;
    color: var(--terra);
    letter-spacing: 2px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(265px, 1fr));
    gap: 14px;
  }

  /* CARD */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    position: relative;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    overflow: hidden;
    animation: fadeUp 0.35s ease both;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    background: var(--cat-color, var(--terra));
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px var(--shadow);
    border-color: var(--terra-light);
  }
  .card-cat {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--cream-dark);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.71rem;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 11px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .card-cat:hover { background: var(--border); }
  .card-name {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 1.18rem;
    font-weight: 700;
    color: var(--brown);
    margin-bottom: 3px;
    line-height: 1.2;
  }
  .card-profession {
    font-size: 0.83rem;
    color: var(--terra);
    font-weight: 500;
    margin-bottom: 11px;
  }
  .card-desc {
    font-size: 0.8rem;
    color: var(--text-muted);
    line-height: 1.55;
    margin-bottom: 12px;
    border-right: 2px solid var(--border);
    padding-right: 9px;
    font-style: italic;
  }
  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.74rem;
    color: var(--text-muted);
  }
  .phone-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--olive);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.8rem;
    font-family: 'Heebo', sans-serif;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
    direction: ltr;
    margin-top: 2px;
  }
  .phone-btn:hover { background: var(--olive-light); }

  /* NO RESULTS */
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    display: none;
  }
  .no-results.show { display: block; }
  .no-results h3 { font-family: 'Frank Ruhl Libre', serif; font-size: 1.4rem; margin: 12px 0 8px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .stats-bar { gap: 16px; }
    .stat-num { font-size: 1.5rem; }
    .grid { grid-template-columns: 1fr; }
    .stat-divider { display: none; }
  }

  .footer {
    text-align: center;
    padding: 24px;
    font-size: 0.74rem;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
  }
</style>
</head>

const CAT_EMOJI = {
  "אוכל ומזון":"🍲","אזעקות ומצלמות":"📹","אחזקה":"🔧","אחר":"⭐",
  "אינסטלציה":"🚿","אירועים והפעלות":"🎉","בעלי חיים":"🐾","גז":"🔥",
  "גינון":"🌿","דוד שמש":"☀️","הדברה":"🪲","הובלות":"🚚",
  "חינוך ולימוד":"📚","חשמל":"⚡","טיפול ורפואה":"💆","מוזיקה ולימוד":"🎵",
  "מוצרי חשמל ביתיים":"🏠","מוצרי מזון ומכולת":"🛒","מזגנים":"❄️",
  "מחשבים ואלקטרוניקה":"💻","מסגרות ומתכת":"🔩","משפט":"⚖️",
  "נגרות":"🪚","נדל\"ן":"🏡","נהיגה":"🚗","ניקיון":"🧹",
  "נסיעות ותיירות":"✈️","ספורט ובריאות":"💪","ספרות":"✂️",
  "עסקים":"💼","פיננסים ורואי חשבון":"💰","צבע ושיפוצים":"🎨",
  "צילום":"📷","קוסמטיקה ויופי":"💄","ריפוד":"🛋️","רפואה":"🏥",
  "תחבורה":"🚌","תפירה":"🧵","תריסים ואלומיניום":"🪟"
};

const CAT_COLORS = [
  "#C4704B","#D4A84B","#5C7A4E","#4B7AC4","#A04BB8","#4BB8A0",
  "#B84B4B","#7A4BC4","#C48B4B","#4BA87A","#C44B8B","#4B8BC4",
  "#8BC44B","#C44B4B","#4BC4C4","#A04B7A","#7AC44B","#4B4BC4",
  "#C47A4B","#4BC4A0","#8B4BC4","#C4A04B","#4B7AB8","#B8C44B"
];

const MONTHS = ["","ינואר","פברואר","מרץ","אפריל","מאי","יוני",
                "יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

let activeCategory = null;
let searchTerm = "";

// Build category stats
const catCounts = {};
DATA.forEach(d => { if(d.category) catCounts[d.category] = (catCounts[d.category]||0)+1; });
const categories = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);

const catColorMap = {};
categories.forEach((c,i) => catColorMap[c] = CAT_COLORS[i % CAT_COLORS.length]);

// Build chips
const chipsEl = document.getElementById("filterChips");
const allChip = document.createElement("button");
allChip.className = "filter-chip active";
allChip.innerHTML = `🗂️ הכל <span class="chip-count">${DATA.length}</span>`;
allChip.onclick = () => setCategory(null);
chipsEl.appendChild(allChip);

categories.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "filter-chip";
  const em = CAT_EMOJI[cat] || "📌";
  btn.innerHTML = `${em} ${cat} <span class="chip-count">${catCounts[cat]}</span>`;
  btn.onclick = () => setCategory(cat);
  btn.dataset.cat = cat;
  chipsEl.appendChild(btn);
});

function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
  if (!cat) {
    allChip.classList.add("active");
    document.getElementById("sectionLabel").textContent = "כל בעלי המקצוע";
  } else {
    document.querySelector(`[data-cat="${CSS.escape(cat)}"]`)?.classList.add("active");
    document.getElementById("sectionLabel").textContent = `${CAT_EMOJI[cat]||""} ${cat}`;
  }
  // Scroll chips into view
  if (cat) {
    const chip = document.querySelector(`[data-cat="${CSS.escape(cat)}"]`);
    chip?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
  render();
}

function getFiltered() {
  return DATA.filter(d => {
    const matchCat = !activeCategory || d.category === activeCategory;
    if (!matchCat) return false;
    if (!searchTerm) return true;
    const t = searchTerm.toLowerCase();
    return (
      (d.name||"").toLowerCase().includes(t) ||
      (d.profession||"").toLowerCase().includes(t) ||
      (d.category||"").toLowerCase().includes(t) ||
      (d.description||"").toLowerCase().includes(t) ||
      (d.recommender||"").toLowerCase().includes(t) ||
      (d.phone||"").includes(t)
    );
  });
}

function formatDate(str) {
  if (!str) return "";
  const p = str.split("/");
  if (p.length < 3) return str;
  const m = parseInt(p[0]);
  const y = parseInt(p[2]) + 2000;
  return `${MONTHS[m] || m} ${y}`;
}

function cleanDesc(desc) {
  return (desc||"")
    .replace(/\(קובץ vcf\)/g,"")
    .replace(/\(קובץ vcf \+ מספר טלפון\)/g,"")
    .replace(/\(קובץ vcf\+מספר טלפון\)/g,"")
    .trim();
}

function render() {
  const filtered = getFiltered();
  const grid = document.getElementById("cardsGrid");
  const noRes = document.getElementById("noResults");

  document.getElementById("visibleCount").textContent = filtered.length;
  document.getElementById("totalCount").textContent = filtered.length;

  grid.innerHTML = "";

  if (filtered.length === 0) {
    noRes.classList.add("show");
    return;
  }
  noRes.classList.remove("show");

  const frag = document.createDocumentFragment();
  filtered.forEach((item, i) => {
    const cat = item.category || "אחר";
    const emoji = CAT_EMOJI[cat] || "📌";
    const color = catColorMap[cat] || "#C4704B";
    const desc = cleanDesc(item.description);
    const delay = Math.min(i * 0.03, 0.5);

    const card = document.createElement("div");
    card.className = "card";
    card.style.cssText = `--cat-color:${color};animation-delay:${delay}s`;

    card.innerHTML = `
      <div class="card-cat" data-catclick="${cat.replace(/"/g,'&quot;')}">
        ${emoji} ${cat}
      </div>
      <div class="card-name">${item.name || "—"}</div>
      <div class="card-profession">${item.profession || ""}</div>
      ${desc ? `<div class="card-desc">"${desc}"</div>` : ""}
      <div class="card-meta">
        ${item.recommender ? `<span class="meta-item">👤 ${item.recommender}</span>` : ""}
        ${item.date ? `<span class="meta-item">📅 ${formatDate(item.date)}</span>` : ""}
      </div>
      ${item.phone ? `<a href="tel:${item.phone}" class="phone-btn">📞 ${item.phone}</a>` : ""}
    `;

    card.querySelector(".card-cat").addEventListener("click", e => {
      setCategory(e.currentTarget.dataset.catclick);
    });

    frag.appendChild(card);
  });
  grid.appendChild(frag);
}

document.getElementById("searchInput").addEventListener("input", e => {
  searchTerm = e.target.value;
  render();
});

render();
</script>
